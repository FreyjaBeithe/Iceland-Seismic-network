<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <title>Iceland Seismic Network</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-sidebar-v2@3.2.3/css/leaflet-sidebar.min.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a1a; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; height: 100vh; width: 100%; z-index: 1; }
        
        /* Chart Styling */
        .leaflet-sidebar-content img {
            display: block;
            margin: 8px auto;
            width: 380px; 
            max-width: 95%;
            height: auto;
            border: 1px solid #ddd;
            background-color: #fff;
        }

        /* Marker Styles */
        .red-dot { background-color: #ff0000 !important; border: 1px solid #ffffff; border-radius: 50%; width: 8px !important; height: 8px !important; box-shadow: 0 0 3px rgba(0,0,0,0.8); z-index: 500 !important; }
        .gps-triangle { width: 0; height: 0; border-left: 7px solid transparent; border-right: 7px solid transparent; border-bottom: 12px solid #2e7d32; filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.5)); }
        
        .station-label { background: transparent !important; border: none !important; color: #ffffff !important; font-weight: bold; font-size: 11px; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; pointer-events: none; }
        .coords-text { font-family: monospace; font-size: 11px; color: #444; background: #f4f4f4; padding: 5px; border-radius: 3px; border-left: 3px solid #c62828; font-weight: bold; }
        .leaflet-sidebar { z-index: 2000 !important; }
    </style>
</head>
<body>

    <div id="sidebar" class="leaflet-sidebar collapsed">
        <div class="leaflet-sidebar-tabs">
            <ul role="tablist">
                <li><a href="#home" role="tab">📈</a></li>
                <li><a href="#gps" role="tab"><i class="fa fa-location-arrow"></i></a></li>
            </ul>
        </div>

        <div class="leaflet-sidebar-content">
            <div class="leaflet-sidebar-pane" id="home">
                <h2 class="leaflet-sidebar-header" style="background-color: #c62828;">
                    Iceland Seismic Network
                    <span class="leaflet-sidebar-close"><i class="fa fa-caret-left"></i></span>
                </h2>
                <div style="padding:15px;">
                    <input type="text" id="stationSearch" placeholder="Search (e.g. ASH)..." style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc; margin-bottom: 15px;">
                    <div id="station-data">
                        <p style="text-align: center; color: #666;">Select a red dot to begin monitoring.</p>
                    </div>
                </div>
            </div>

            <div class="leaflet-sidebar-pane" id="gps">
                <h2 class="leaflet-sidebar-header" style="background-color: #2e7d32;">
                    GPS Deformation
                    <span class="leaflet-sidebar-close"><i class="fa fa-caret-left"></i></span>
                </h2>
                <div id="gps-data" style="padding:15px;">
                    <p style="text-align: center; color: #666;">Select a green triangle to view uplift.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-sidebar-v2@3.2.3/js/leaflet-sidebar.min.js"></script>

    <script>
        // 1. Map Initialization
        var map = L.map('map', { zoomControl: false }).setView([63.9, -22.3], 9);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);
        var sidebar = L.control.sidebar({ container: 'sidebar' }).addTo(map);

        // 2. Data
        var stations = [
            { id: "klv", name: "Kleifarvatn", lat: 63.914, lon: -21.959, url: "klv" },
            { id: "lfe", name: "Lágafell", lat: 63.881, lon: -22.534, url: "lfe" },
            { id: "seng", name: "Svartsengi GPS", lat: 63.892, lon: -22.425, type: "gps", url: "SENG" },
            { id: "hrag", name: "Hraunshóll GPS", lat: 63.921, lon: -22.348, type: "gps", url: "HRAG" }
        ];

        // 3. Marker Creation
        stations.forEach(st => {
            let icon;
            if (st.type === 'gps') {
                icon = L.divIcon({ className: 'gps-triangle', iconSize: [14, 12], iconAnchor: [7, 12] });
            } else {
                icon = L.divIcon({ className: 'red-dot', iconSize: [8, 8], iconAnchor: [4, 4] });
            }
            
            var marker = L.marker([st.lat, st.lon], { icon: icon }).addTo(map);
            marker.bindTooltip(st.id.toUpperCase(), { permanent: true, direction: 'top', className: 'station-label', offset: [0, -10] });

            marker.on('click', function() {
                if (st.type === 'gps') {
                    sidebar.open('gps');
                    var gpsURL = `https://vmkerfi.vedur.is/gps/station_plot.php?station=${st.url}&type=vertical`;
                    document.getElementById('gps-data').innerHTML = `<h3>${st.name}</h3><img src="${gpsURL}">`;
                } else {
                    sidebar.open('home');
                    var tremorURL = `https://wsrv.nl/?url=http://hraun.vedur.is/ja/oroi/${st.url}.gif&noproxy`;
                    document.getElementById('station-data').innerHTML = `<h3>${st.name}</h3><img src="${tremorURL}">`;
                }
            });
        });

        // 4. Reset on Close
        sidebar.on('closing', function() {
            map.setView([63.9, -22.3], 9);
        });
    </script>
</body>
</html>
