    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a1a; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; height: 100vh; width: 100%; z-index: 1; }
        
        .leaflet-sidebar-content img {
            display: block;
            margin: 8px auto;
            width: 380px; 
            max-width: 95%;
            height: auto;
            image-rendering: auto;
            border: 1px solid #ddd;
            background-color: #fff;
        }

        .leaflet-sidebar-content h2 { margin-top: 0; }
        .leaflet-sidebar-content p { margin: 4px 0 !important; }

        .red-dot { background-color: #ff0000 !important; border: 1px solid #ffffff; border-radius: 50%; width: 8px !important; height: 8px !important; box-shadow: 0 0 3px rgba(0,0,0,0.8); z-index: 500 !important; }
        
        /* 2. ADDED GPS TRIANGLE STYLE */
        .gps-triangle { width: 0; height: 0; border-left: 7px solid transparent; border-right: 7px solid transparent; border-bottom: 12px solid #2e7d32; filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.5)); }

        .station-label { background: transparent !important; border: none !important; box-shadow: none !important; color: #ffffff !important; font-weight: bold; font-size: 11px; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; text-align: center; pointer-events: none; }
        .coords-text { font-family: monospace; font-size: 11px; color: #444; background: #f4f4f4; padding: 5px; border-radius: 3px; border-left: 3px solid #c62828; font-weight: bold; }
        .leaflet-sidebar { z-index: 2000 !important; }
    </style>

            } else {
                icon = L.divIcon({ className: 'red-dot', iconSize: [8, 8], iconAnchor: [4, 4] });
            }

            allMarkers.push(marker);

                    const gpsURL = `https://vmkerfi.vedur.is/gps/station_plot.php?station=${st.url}&type=vertical`;
