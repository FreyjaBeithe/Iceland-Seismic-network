<!DOCTYPE html>
<html lang="en-GB">
<head>
    <link rel="icon" type="image/x-icon" href="favicon[1].ico">
    <meta charset="UTF-8">
    <title>Iceland Seismic Network</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-sidebar-v2@3.2.3/css/leaflet-sidebar.min.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a1a; overflow: hidden; }
        
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; height: 100vh; width: 100%; z-index: 1; }

        /* Label Styling */
        .leaflet-tooltip-top:before, .leaflet-tooltip-bottom:before, 
        .leaflet-tooltip-left:before, .leaflet-tooltip-right:before { display: none !important; }

        /* Force the image to stay small and sharp */
        .leaflet-sidebar-content img {
            image-rendering: -webkit-optimize-contrast; /* Sharpens text */
            image-rendering: pixelated;
            display: block;
            margin: 15px auto; 
            width: 400px; /* This is close to the IMO's natural chart width */
            max-width: 95%; /* Safety for mobile screens */
            height: auto;
            border: 2px solid #333;
            background: #000; /* Contrast background for the chart */
        }
        

     /* 1. The Red Dot itself */
        .red-dot {
            background-color: #ff0000 !important; /* Forces red */
            border: 1px solid #ffffff;
            border-radius: 50%;
            width: 8px !important;
            height: 8px !important;
            box-shadow: 0 0 3px rgba(0,0,0,0.8);
            z-index: 500 !important; /* Keeps the dot visible */
        }

        /* 2. The Station Label (The Text) */
        .station-label {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            color: #ffffff !important; 
            font-weight: bold;
            font-size: 11px;
            /* Sharp black outline for Satellite/Topo clarity */
            text-shadow: 
                -1px -1px 0 #000,  
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000;
            text-align: center;
            pointer-events: none; /* Let clicks pass through to the dot */
        }

     .btn { 
    display: block; 
    background: #c62828; 
    color: #000000 !important; /* Forces the text to be black */
    padding: 10px; 
    text-align: center; 
    text-decoration: none; 
    border-radius: 5px; 
    font-weight: bold; 
    margin-bottom: 5px; 
    transition: background 0.3s; 
    border: none; 
    cursor: pointer; 
}
        .btn:hover { background: #9b1c1c; }
        .coords-text { font-family: monospace; font-size: 11px; color: #666; background: #f4f4f4; padding: 5px; border-radius: 3px; border-left: 3px solid #c62828; }
        
        /* Ensure sidebar is above map */
        .leaflet-sidebar { z-index: 2000 !important; }
    </style>
</head>
<body>

    <div id="sidebar" class="leaflet-sidebar collapsed">
        <div class="leaflet-sidebar-tabs">
            <ul role="tablist"><li><a href="#home" role="tab">📉</a></li></ul>
        </div>
        <div class="leaflet-sidebar-content">
            <div class="leaflet-sidebar-pane" id="home">
                <h2 class="leaflet-sidebar-header" style="background-color: #c62828;">Iceland Seismic Network<span class="leaflet-sidebar-close">×</span></h2>
                <div style="padding:15px;">
                    
                    <div style="position: relative; width: 100%; display: flex; align-items: center; margin-bottom: 20px;">
    <input type="text" id="stationSearch" placeholder="Search station (e.g. ASH)..." 
           style="width: 100%; padding: 10px; padding-right: 30px; border-radius: 4px; border: 1px solid #ccc; background: #fff; color: #333;">
    <button id="clearSearch" title="Clear Search" 
            style="position: absolute; right: 10px; background: none; border: none; color: #888; cursor: pointer; font-size: 18px; display: none;">✕</button>
</div>

                  

                    <div id="station-data">
                        <p>Select a station on the map to begin monitoring.</p>
                    </div>

                    <div style="margin-top: 30px; border-top: 1px solid #444; padding-top: 10px; text-align: center;">
                        <p style="font-size: 11px; color: #888; margin: 0;">Created & Maintained by <br><b>VOLCANOWATCHERS</b></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="map"></div>

   <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-sidebar-v2@3.2.3/js/leaflet-sidebar.min.js"></script>

    <script>
        // 1. Initialize Map
        const allMarkers = [];
        var map = L.map('map', { 
            zoomControl: false,
            minZoom: 6,
            scrollWheelZoom: true,
            maxBounds: [[63.20, -24.80], [66.80, -13.20]],
            maxBoundsViscosity: 1.0
        }).setView([64.90, -18.5], 7);

        var topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 });
        var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri Satellite'
        });

        topo.addTo(map);

        var baseMaps = { "Topographic": topo, "Satellite": satellite };
        L.control.layers(baseMaps).addTo(map);
        L.control.scale({ imperial: false, position: 'bottomleft' }).addTo(map);
        L.control.zoom({ position: 'topright' }).addTo(map);

        // 2. Initialize Sidebar
        var sidebar = L.control.sidebar({ container: 'sidebar' }).addTo(map);

        function resetMap() {
            const searchInput = document.getElementById('stationSearch');
            if (searchInput) searchInput.value = '';
            allMarkers.forEach(marker => marker.addTo(map));
        }
        sidebar.on('closing', resetMap);

        // 3. Station Data
       var stations = [
            { id: "klv", name: "Kleifarvatn", lat: 63.91447, lon: -21.95979, url: "klv" },
            { id: "odf", name: "Ölkelduháls", lat: 63.94253, lon: -22.11324, url: "odf" },
            { id: "eld", name: "Eldey", lat: 63.74067, lon: -22.95803, url: "eld" },
            { id: "fad", name: "Fagradalsfjall", lat: 63.91668, lon: -22.28938, url: "fad" },
            { id: "grv", name: "Grindavík", lat: 63.85716, lon: -22.45583, url: "grv" },
            { id: "rne", name: "Reykjanesviti", lat: 63.81681, lon: -22.70563, url: "rne" },
            { id: "vog", name: "Vogar", lat: 63.96967, lon: -22.39285, url: "vog" },
            { id: "moh", name: "Móhálshnúkar", lat: 63.92269, lon: -22.06688, url: "moh" },
            { id: "ash", name: "Afstapahraun", lat: 63.98167, lon: -22.14986, url: "ash" },
            { id: "kri", name: "Krýsuvík", lat: 63.8781, lon: -22.07646, url: "kri" },
            { id: "iss", name: "Ísólfsskáli-S", lat: 63.86524, lon: -22.30963, url: "iss" },
            { id: "lag", name: "Lágar", lat: 63.90702, lon: -22.47801, url: "lag" },
            { id: "rah", name: "Rauðhólar", lat: 63.852372, lon: -22.58946, url: "rah" },
            { id: "lfe", name: "Lágafell", lat: 63.88183, lon: -22.53423, url: "lfe" },
            { id: "ger", name: "Gerðar", lat: 63.83104, lon: -22.47742, url: "ger" },
            { id: "hrv", name: "Hraunsvík", lat: 63.89597, lon: -22.18444, url: "hrv" },
            { id: "hvs", name: "Hveragerði", lat: 63.939395, lon: -21.714498, url: "hvs" },
            { id: "bja", name: "Bjarnarflag", lat: 63.946, lon: -21.303, url: "bja" },
            { id: "hei", name: "Heiðarsporður", lat: 64.200, lon: -21.237, url: "hei" },
            { id: "ask", name: "Askja", lat: 65.053807, lon: -16.644591, url: "ask" },
            { id: "vos", name: "Vogsosar", lat: 63.852759, lon: -21.702033, url: "vos" },
            { id: "ada", name: "Adalbol", lat: 65.032106, lon: -15.399528, url: "ada" },
            { id: "alf", name: "Alftagrof", lat: 63.490613, lon: -19.188062, url: "alf" },
            { id: "asm", name: "Asmuli", lat: 63.833146, lon: -20.611921, url: "asm" },
            { id: "aus", name: "Austmannsbunga", lat: 63.684091, lon: -19.077611, url: "aus" },
            { id: "bjk", name: "Bruarjokull", lat: 64.465884, lon: -16.769616, url: "bjk" },
            { id: "ble", name: "Bleikáluháls", lat: 65.07795, lon: -18.63868, url: "ble" },
            { id: "dim", name: "Dimmadalsas", lat: 65.961592, lon: -16.933611, url: "dim" },
            { id: "djk", name: "Dyngjujökull", lat: 64.50405, lon: -17.23571, url: "djk" },
            { id: "esk", name: "Eysrtri-Skogar", lat: 63.525355, lon: -19.449540, url: "esk" },
            { id: "fag", name: "Fagurholmsmyri", lat: 63.875176, lon: -16.651050, url: "fag" },
            { id: "fed", name: "Fedgar", lat: 64.02508, lon: -19.69086, url: "fed" },
            { id: "gei", name: "Geitafell", lat: 63.946510, lon: -21.527603, url: "gei" },
            { id: "god", name: "Godabunga", lat: 63.65976, lon: -19.32236, url: "god" },
            { id: "grf", name: "Grímsfjall", lat: 64.40656, lon: -17.26713, url: "grf" },
            { id: "gri", name: "Grimsey", lat: 66.54152, lon: -18.00951, url: "gri" },
            { id: "hau", name: "Haukadalur", lat: 63.96851, lon: -19.96471, url: "hau" },
            { id: "hvo", name: "Lágu-Hvolar", lat: 63.5261, lon: -18.84781, url: "hvo" },
            { id: "jok", name: "Jökulheimar", lat: 64.31529, lon: -18.22546, url: "jok" },
            { id: "kal", name: "Kálfafell", lat: 63.94761, lon: -17.68698, url: "kal" },
            { id: "kis", name: "Kista", lat: 64.67413, lon: -17.56167, url: "kis" },
            { id: "kre", name: "Krepputunguhraun", lat: 64.78369, lon: -16.38282, url: "kre" },
            { id: "kro", name: "Krókur", lat: 64.09806, lon: -21.11976, url: "kro" },
            { id: "lei", name: "Leirhöfn", lat: 66.40665, lon: -16.48957, url: "lei" },
            { id: "lsk", name: "Litla-Skógfell", lat: 63.922795, lon: -22.368852, url: "lsk" },
            { id: "nyl", name: "Nýlenda", lat: 63.97368, lon: -22.73792, url: "nyl" },
            { id: "san", name: "Sandskeið", lat: 64.05601, lon: -21.57013, url: "san" },
            { id: "sig", name: "Siglufjörður", lat: 66.13229, lon: -18.91483, url: "sig" },
            { id: "tho", name: "Þorvaldshraun", lat: 64.93372, lon: -16.67558, url: "tho" },
            { id: "ves", name: "Vestmannaeyjar (S)", lat: 63.44291, lon: -20.28664, url: "ves" }
        ];
       
        // 4. Create Markers and Sidebar Content
        stations.forEach(st => {
            var redDotIcon = L.divIcon({ className: 'red-dot', iconSize: [8, 8], iconAnchor: [4, 4] });
            const marker = L.marker([st.lat, st.lon], { icon: redDotIcon }).addTo(map);
            
            marker.stationID = st.id.toLowerCase();
            allMarkers.push(marker);

            marker.bindTooltip(st.id.toUpperCase(), {
                permanent: true,
                direction: 'top',
                className: 'station-label',
                offset: [22, 22]
            });

            marker.on('click', function() {
                sidebar.open('home');
                const secureDrumURL = `https://wsrv.nl/?url=http://hraun.vedur.is/ja/drumplot/drumplot/${st.url}_highpass_2.0.png&noproxy`;
                const secureTremorURL = `https://wsrv.nl/?url=http://hraun.vedur.is/ja/oroi/${st.url}.gif&noproxy`;
                
                document.getElementById('station-data').innerHTML = `
                    <div style="padding:10px;">
                        <h2 style="color:#c62828; margin-bottom:5px;">${st.name} (${st.id.toUpperCase()})</h2>
                        <div class="coords-text">LAT: ${st.lat} | LON: ${st.lon}</div>
                        
                        <p style="margin:15px 0 5px 0; font-weight: bold; color: #ddd;">Live Tremor Chart:</p>
                        <a href="${secureTremorURL}" target="_blank" title="Click for full size">
                            <img src="${secureTremorURL}" alt="Tremor Chart">
                        </a>
                        <p style="font-size: 11px; color: #888; text-align: center; margin-top: 5px;">(Click image for full size)</p>

                        <p style="margin:25px 0 5px 0; font-weight: bold; color: #ddd;">Live Drum Plot:</p>
                        <a href="${secureDrumURL}" target="_blank" title="Click for full size">
                            <img src="${secureDrumURL}" alt="Drum Plot">
                        </a>
                        <p style="font-size: 11px; color: #888; text-align: center; margin-top: 5px;">(Click image for full size)</p>
                    </div>`;
            });
        });

        // 5. Search Logic
        const searchInput = document.getElementById('stationSearch');
        const clearBtn = document.getElementById('clearSearch');

        if (searchInput) {
            searchInput.addEventListener('input', function(e) {
                const term = e.target.value.toLowerCase().trim();
                clearBtn.style.display = term.length > 0 ? 'block' : 'none';

                if (term.length === 3) {
                    const match = allMarkers.find(m => m.stationID === term);
                    if (match) {
                        allMarkers.forEach(m => m.addTo(map));
                        map.setView(match.getLatLng(), 10);
                        match.fire('click');
                    }
                }
            });

            clearBtn.addEventListener('click', function() {
                searchInput.value = '';
                this.style.display = 'none';
                sidebar.close();
                allMarkers.forEach(m => m.addTo(map));
                map.setView([64.9, -19.0], 7);
            });
        }
    </script>
</body>
</html>
